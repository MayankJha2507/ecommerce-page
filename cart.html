<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart – ShopHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Start VWO SmartCode -->
  <script src="https://dev.visualwebsiteoptimizer.com/tag/1226578.js"></script>
  <!-- End VWO SmartCode -->
  <script>
    window.VWO = window.VWO || [];
    VWO.event = VWO.event || function () { VWO.push(["event"].concat([].slice.call(arguments))); };
    console.log('[VWO] initialized on cart.html');
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-tight">ShopHub</a>
        <div class="flex items-center gap-8">
          <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors">Home</a>
          <a href="cart.html" class="relative flex items-center text-indigo-600" aria-label="Cart">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cart-count" class="absolute -top-2 -right-2.5 bg-indigo-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 min-h-[60vh]">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Your Cart</h1>

    <!-- Empty state -->
    <div id="empty-cart" class="hidden text-center py-24">
      <p class="text-gray-300 text-7xl mb-6">🛒</p>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Your cart is empty</h2>
      <p class="text-gray-500 mb-8">Looks like you haven't added anything yet.</p>
      <a href="index.html" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-lg transition-colors">
        Continue Shopping
      </a>
    </div>

    <!-- Cart content -->
    <div id="cart-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Items list -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h2 class="font-semibold text-gray-900">Items</h2>
            <button id="clear-cart-btn" class="text-sm text-red-400 hover:text-red-600 transition-colors font-medium">
              Clear all
            </button>
          </div>
          <div id="cart-items" class="divide-y divide-gray-100 px-6"></div>
        </div>
      </div>

      <!-- Order summary -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
          <h2 class="font-semibold text-gray-900 mb-5">Order Summary</h2>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between text-gray-600">
              <span>Subtotal</span>
              <span id="subtotal" class="font-medium text-gray-900">$0.00</span>
            </div>
            <div class="flex justify-between text-gray-600">
              <span>Shipping</span>
              <span id="shipping" class="font-medium text-gray-900">$5.00</span>
            </div>
            <div class="border-t border-gray-100 pt-3 flex justify-between text-base font-bold text-gray-900">
              <span>Total</span>
              <span id="total">$0.00</span>
            </div>
          </div>
          <a href="checkout.html"
            class="mt-6 block w-full bg-indigo-600 hover:bg-indigo-700 text-white text-center font-semibold px-6 py-3.5 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Proceed to Checkout
          </a>
          <a href="index.html" class="mt-3 block text-center text-sm text-indigo-600 hover:text-indigo-800 transition-colors">
            ← Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t mt-16 py-8 text-center text-sm text-gray-400">
    © 2026 ShopHub. All rights reserved.
  </footer>

  <script>
    const CART_KEY = 'shophub_cart';

    function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
    function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }

    function updateCartCount() {
      const count = getCart().reduce((s, i) => s + i.quantity, 0);
      document.getElementById('cart-count').textContent = count;
    }

    function renderCart() {
      const cart = getCart();
      const emptyEl = document.getElementById('empty-cart');
      const contentEl = document.getElementById('cart-content');
      const itemsEl = document.getElementById('cart-items');

      if (cart.length === 0) {
        emptyEl.classList.remove('hidden');
        contentEl.classList.add('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      contentEl.classList.remove('hidden');

      itemsEl.innerHTML = '';
      cart.forEach(item => {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-4 py-5';
        row.innerHTML = `
          <a href="product.html?id=${item.id}" class="flex-shrink-0">
            <img src="${item.image}" alt="${item.name}"
                 class="w-20 h-20 object-cover rounded-xl bg-gray-100 hover:opacity-80 transition-opacity">
          </a>
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-gray-900 truncate">
              <a href="product.html?id=${item.id}" class="hover:text-indigo-600 transition-colors">${item.name}</a>
            </h3>
            <p class="text-sm text-gray-400 mt-0.5">$${item.price.toFixed(2)} each</p>
          </div>
          <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden select-none flex-shrink-0">
            <button class="qty-btn px-3 py-2 text-gray-600 hover:bg-gray-100 transition-colors text-lg leading-none"
              data-id="${item.id}" data-action="dec" aria-label="Decrease">−</button>
            <span class="px-3 py-2 text-sm font-semibold min-w-[2.25rem] text-center border-x border-gray-200">${item.quantity}</span>
            <button class="qty-btn px-3 py-2 text-gray-600 hover:bg-gray-100 transition-colors text-lg leading-none"
              data-id="${item.id}" data-action="inc" aria-label="Increase">+</button>
          </div>
          <p class="font-semibold text-gray-900 w-16 text-right flex-shrink-0">$${(item.price * item.quantity).toFixed(2)}</p>
          <button class="remove-btn text-gray-300 hover:text-red-500 transition-colors p-1 flex-shrink-0" data-id="${item.id}" aria-label="Remove item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        `;
        itemsEl.appendChild(row);
      });

      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shipping = 5;
      const total = subtotal + shipping;

      document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('total').textContent = '$' + total.toFixed(2);
    }

    // Event delegation for cart interactions
    document.getElementById('cart-items').addEventListener('click', function (e) {
      const qtyBtn = e.target.closest('.qty-btn');
      const removeBtn = e.target.closest('.remove-btn');

      if (qtyBtn) {
        const id = parseInt(qtyBtn.dataset.id);
        const action = qtyBtn.dataset.action;
        const cart = getCart();
        const item = cart.find(i => i.id === id);
        if (!item) return;

        if (action === 'inc') {
          item.quantity++;
        } else if (action === 'dec') {
          item.quantity--;
          if (item.quantity <= 0) {
            cart.splice(cart.indexOf(item), 1);
          }
        }
        saveCart(cart);
        updateCartCount();
        renderCart();
      }

      if (removeBtn) {
        const id = parseInt(removeBtn.dataset.id);
        saveCart(getCart().filter(i => i.id !== id));
        updateCartCount();
        renderCart();
      }
    });

    document.getElementById('clear-cart-btn').addEventListener('click', function () {
      localStorage.removeItem(CART_KEY);
      updateCartCount();
      renderCart();
    });

    renderCart();
    updateCartCount();
  </script>
</body>
</html>
