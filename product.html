<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – ShopHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Start VWO SmartCode -->
  <script src="https://dev.visualwebsiteoptimizer.com/tag/1226578.js"></script>
  <!-- End VWO SmartCode -->
  <script>
    window.VWO = window.VWO || [];
    VWO.event = VWO.event || function () { VWO.push(["event"].concat([].slice.call(arguments))); };
    console.log('[VWO] initialized on product.html');
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-tight">ShopHub</a>
        <div class="flex items-center gap-8">
          <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors">Home</a>
          <a href="cart.html" class="relative flex items-center text-gray-600 hover:text-indigo-600 transition-colors" aria-label="Cart">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cart-count" class="absolute -top-2 -right-2.5 bg-indigo-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main id="product-main" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 min-h-[60vh]"></main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 pointer-events-none">
    <div id="toast-inner" class="bg-gray-900 text-white text-sm font-medium px-5 py-3 rounded-xl shadow-xl transform translate-y-4 opacity-0 transition-all duration-300"></div>
  </div>

  <footer class="bg-white border-t mt-16 py-8 text-center text-sm text-gray-400">
    © 2026 ShopHub. All rights reserved.
  </footer>

  <script src="js/products.js"></script>
  <script>
    const CART_KEY = 'shophub_cart';

    function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
    function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }

    function updateCartCount() {
      const count = getCart().reduce((s, i) => s + i.quantity, 0);
      document.getElementById('cart-count').textContent = count;
    }

    function addToCart(product, qty) {
      const cart = getCart();
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.quantity += qty;
      else cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, quantity: qty });
      saveCart(cart);
      updateCartCount();
    }

    function showToast(message) {
      const inner = document.getElementById('toast-inner');
      inner.textContent = message;
      inner.classList.remove('translate-y-4', 'opacity-0');
      inner.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        inner.classList.remove('translate-y-0', 'opacity-100');
        inner.classList.add('translate-y-4', 'opacity-0');
      }, 2500);
    }

    // Load product from URL
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get('id'));
    const product = PRODUCTS.find(p => p.id === productId);
    const main = document.getElementById('product-main');

    if (!product) {
      main.innerHTML = `
        <div class="text-center py-24">
          <p class="text-gray-400 text-6xl mb-6">🔍</p>
          <h2 class="text-2xl font-bold text-gray-900 mb-2">Product not found</h2>
          <p class="text-gray-500 mb-8">The product you're looking for doesn't exist or has been removed.</p>
          <a href="index.html" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-lg transition-colors">
            ← Back to Store
          </a>
        </div>
      `;
    } else {
      document.title = `${product.name} – ShopHub`;

      main.innerHTML = `
        <!-- Breadcrumb -->
        <nav class="text-sm text-gray-500 mb-8 flex items-center gap-2">
          <a href="index.html" class="hover:text-indigo-600 transition-colors">Home</a>
          <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="text-gray-400">${product.category}</span>
          <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="text-gray-900 font-medium truncate">${product.name}</span>
        </nav>

        <!-- Product detail -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
          <!-- Image -->
          <div class="rounded-2xl overflow-hidden bg-gray-100 shadow-sm">
            <img src="${product.image}" alt="${product.name}" class="w-full h-auto object-cover">
          </div>

          <!-- Info -->
          <div class="flex flex-col">
            <span class="text-xs font-semibold text-indigo-500 uppercase tracking-widest mb-2">${product.category}</span>
            <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-3 leading-tight">${product.name}</h1>

            <!-- Stars -->
            <div class="flex items-center gap-2 mb-5">
              <span class="text-yellow-400 text-lg leading-none">★★★★</span><span class="text-gray-300 text-lg leading-none">★</span>
              <span class="text-sm text-gray-500">4.0 · 128 reviews</span>
            </div>

            <p class="text-3xl font-bold text-gray-900 mb-6">$${product.price.toFixed(2)}</p>
            <p class="text-gray-600 leading-relaxed text-base mb-8">${product.description}</p>

            <!-- Quantity -->
            <div class="flex items-center gap-4 mb-6">
              <span class="text-sm font-medium text-gray-700">Quantity:</span>
              <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden select-none">
                <button id="qty-minus" aria-label="Decrease quantity"
                  class="px-4 py-2.5 text-gray-600 hover:bg-gray-100 transition-colors text-xl leading-none font-light">−</button>
                <span id="qty-display" class="px-4 py-2.5 text-sm font-semibold min-w-[3rem] text-center border-x border-gray-300">1</span>
                <button id="qty-plus" aria-label="Increase quantity"
                  class="px-4 py-2.5 text-gray-600 hover:bg-gray-100 transition-colors text-xl leading-none font-light">+</button>
              </div>
            </div>

            <button id="add-to-cart-btn"
              class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-4 rounded-xl text-base transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 mb-5">
              Add to Cart
            </button>

            <!-- In stock badge -->
            <div class="flex items-center gap-2 text-sm text-green-600 font-medium">
              <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
              </svg>
              In Stock · Free shipping on orders over $100
            </div>

            <!-- Feature highlights -->
            <div class="mt-8 pt-8 border-t border-gray-100 grid grid-cols-3 gap-4 text-center text-sm text-gray-500">
              <div>
                <div class="text-2xl mb-1">🔒</div>
                <div>Secure Checkout</div>
              </div>
              <div>
                <div class="text-2xl mb-1">↩️</div>
                <div>30-Day Returns</div>
              </div>
              <div>
                <div class="text-2xl mb-1">🚚</div>
                <div>Fast Delivery</div>
              </div>
            </div>
          </div>
        </div>
      `;

      let quantity = 1;

      document.getElementById('qty-minus').addEventListener('click', () => {
        if (quantity > 1) {
          quantity--;
          document.getElementById('qty-display').textContent = quantity;
        }
      });

      document.getElementById('qty-plus').addEventListener('click', () => {
        if (quantity < 10) {
          quantity++;
          document.getElementById('qty-display').textContent = quantity;
        }
      });

      document.getElementById('add-to-cart-btn').addEventListener('click', function () {
        addToCart(product, quantity);

        VWO.event('productAdded', { productName: product.name });
        console.log('[VWO] productAdded fired:', { productName: product.name });

        this.textContent = '✓ Added to Cart';
        this.disabled = true;
        this.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
        this.classList.add('bg-green-600');
        setTimeout(() => {
          this.textContent = 'Add to Cart';
          this.disabled = false;
          this.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
          this.classList.remove('bg-green-600');
        }, 1500);

        showToast(`${quantity}× "${product.name}" added to cart!`);
      });

      // VWO: product page viewed
      VWO.event('productPageViewed', { pageName: product.name });
      console.log('[VWO] productPageViewed fired:', { pageName: product.name });
    }

    updateCartCount();
  </script>
</body>
</html>
