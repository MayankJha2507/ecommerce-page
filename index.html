<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub – Premium Electronics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.VWO = window.VWO || [];
    VWO.event = VWO.event || function () { VWO.push(["event"].concat([].slice.call(arguments))); };
    console.log('[VWO] initialized on index.html');
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-tight">ShopHub</a>
        <div class="flex items-center gap-8">
          <a href="index.html" class="text-sm font-medium text-indigo-600">Home</a>
          <a href="cart.html" class="relative flex items-center text-gray-600 hover:text-indigo-600 transition-colors" aria-label="Cart">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cart-count" class="absolute -top-2 -right-2.5 bg-indigo-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-800 text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-28 text-center">
      <p class="text-indigo-200 text-sm font-semibold uppercase tracking-widest mb-4">New arrivals · Free shipping over $100</p>
      <h1 class="text-5xl sm:text-6xl font-extrabold mb-5 tracking-tight leading-tight">
        Dress the Way<br class="hidden sm:block"> You Feel
      </h1>
      <p class="text-xl text-indigo-200 mb-10 max-w-xl mx-auto">
        Jackets, watches, pants, shorts and more — timeless style at everyday prices.
      </p>
      <a href="#products" class="inline-block bg-white text-indigo-700 font-semibold px-8 py-3.5 rounded-full hover:bg-indigo-50 transition-colors shadow-lg text-base">
        Shop Now
      </a>
    </div>
  </section>

  <!-- Products -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16" id="products">
    <div class="text-center mb-12">
      <h2 class="text-3xl font-bold text-gray-900">Featured Products</h2>
      <p class="text-gray-500 mt-2">Top-rated picks, hand-selected for you</p>
    </div>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 pointer-events-none">
    <div id="toast-inner" class="bg-gray-900 text-white text-sm font-medium px-5 py-3 rounded-xl shadow-xl transform translate-y-4 opacity-0 transition-all duration-300"></div>
  </div>

  <footer class="bg-white border-t mt-16 py-8 text-center text-sm text-gray-400">
    © 2026 ShopHub. All rights reserved.
  </footer>

  <script src="js/products.js"></script>
  <script>
    const CART_KEY = 'shophub_cart';

    function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
    function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }

    function updateCartCount() {
      const count = getCart().reduce((s, i) => s + i.quantity, 0);
      document.getElementById('cart-count').textContent = count;
    }

    function addToCart(product, qty) {
      const cart = getCart();
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.quantity += qty;
      else cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, quantity: qty });
      saveCart(cart);
      updateCartCount();
    }

    function showToast(message) {
      const inner = document.getElementById('toast-inner');
      inner.textContent = message;
      inner.classList.remove('translate-y-4', 'opacity-0');
      inner.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        inner.classList.remove('translate-y-0', 'opacity-100');
        inner.classList.add('translate-y-4', 'opacity-0');
      }, 2500);
    }

    // Render product cards
    const grid = document.getElementById('product-grid');
    PRODUCTS.forEach(product => {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-2xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden group flex flex-col';
      card.innerHTML = `
        <a href="product.html?id=${product.id}" class="block overflow-hidden bg-gray-100 flex-shrink-0">
          <img src="${product.image}" alt="${product.name}"
               class="w-full h-52 object-cover group-hover:scale-105 transition-transform duration-500"
               loading="lazy">
        </a>
        <div class="p-5 flex flex-col flex-1">
          <span class="text-xs font-semibold text-indigo-500 uppercase tracking-wider">${product.category}</span>
          <h3 class="text-base font-semibold text-gray-900 mt-1 mb-2 leading-snug">
            <a href="product.html?id=${product.id}" class="hover:text-indigo-600 transition-colors">${product.name}</a>
          </h3>
          <p class="text-sm text-gray-500 mb-4 flex-1 line-clamp-2">${product.description}</p>
          <div class="flex items-center justify-between pt-3 border-t border-gray-100 mt-auto">
            <span class="text-xl font-bold text-gray-900">$${product.price.toFixed(2)}</span>
            <button data-id="${product.id}"
              class="add-btn bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
              Add to Cart
            </button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    grid.addEventListener('click', function (e) {
      const btn = e.target.closest('.add-btn');
      if (!btn || btn.disabled) return;

      const product = PRODUCTS.find(p => p.id === parseInt(btn.dataset.id));
      addToCart(product, 1);

      VWO.event('productAdded', { productName: product.name });
      console.log('[VWO] productAdded fired:', { productName: product.name });

      btn.textContent = '✓ Added';
      btn.disabled = true;
      btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
      btn.classList.add('bg-green-600');
      setTimeout(() => {
        btn.textContent = 'Add to Cart';
        btn.disabled = false;
        btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
        btn.classList.remove('bg-green-600');
      }, 1500);

      showToast(`"${product.name}" added to cart!`);
    });

    updateCartCount();
  </script>
</body>
</html>
